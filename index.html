<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PIXEL 4 CUTS</title>
    <!-- 한국어 픽셀 폰트 (갈무리) -->
    <link href="https://cdn.jsdelivr.net/npm/galmuri@latest/dist/galmuri.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Galmuri11', sans-serif;
            background-color: #ffb6c1; /* 키치한 핑크 바탕 */
            background-image: 
                linear-gradient(0deg, transparent 24%, #ff9eaf 25%, #ff9eaf 26%, transparent 27%, transparent 74%, #ff9eaf 75%, #ff9eaf 76%, transparent 77%, transparent), 
                linear-gradient(90deg, transparent 24%, #ff9eaf 25%, #ff9eaf 26%, transparent 27%, transparent 74%, #ff9eaf 75%, #ff9eaf 76%, transparent 77%, transparent);
            background-size: 50px 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        h1 {
            color: #fff;
            text-shadow: 3px 3px 0 #ff00ff, -3px -3px 0 #00ffff;
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 30px;
        }

        .container {
            display: flex;
            gap: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        /* 픽셀아트 느낌의 UI 박스 */
        .box-ui {
            background: #fff;
            border: 4px solid #000;
            box-shadow: 8px 8px 0 #000;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        video {
            border: 4px solid #000;
            width: 320px;
            height: 240px;
            object-fit: cover;
            transform: scaleX(-1); /* 거울 모드 */
            background: #ccc;
        }

        /* 레트로 버튼 스타일 */
        .btn {
            font-family: 'Galmuri11', sans-serif;
            background: #ffff00;
            border: 4px solid #000;
            box-shadow: 4px 4px 0 #000;
            padding: 12px 24px;
            font-size: 1.2rem;
            margin-top: 15px;
            cursor: pointer;
            transition: all 0.1s;
        }

        .btn:active {
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0 #000;
        }

        .btn:disabled {
            background: #d3d3d3;
            cursor: not-allowed;
            transform: translate(4px, 4px);
            box-shadow: 0px 0px 0 #000;
        }

        canvas {
            border: 4px solid #000;
            box-shadow: 8px 8px 0 #000;
        }

        #status {
            margin-top: 15px;
            font-weight: bold;
            color: #ff00ff;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <h1>📸 PIXEL 4 CUTS</h1>

    <div class="container">
        <!-- 카메라 영역 -->
        <div class="box-ui">
            <!-- playsinline은 아이패드/아이폰에서 전체화면으로 넘어가지 않게 방지합니다 -->
            <video id="video" autoplay playsinline></video>
            <div id="status">대기 중... (0/4)</div>
            <button id="captureBtn" class="btn">찰칵! (Capture)</button>
        </div>

        <!-- 결과물 영역 -->
        <div class="box-ui" style="background: #f0f0f0;">
            <canvas id="canvas" width="360" height="1100"></canvas>
            <button id="downloadBtn" class="btn" style="display:none; background: #00ffff;">사진 다운로드</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const captureBtn = document.getElementById('captureBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const statusTxt = document.getElementById('status');

        let shots = 0;
        const maxShots = 4;
        const shotWidth = 320;
        const shotHeight = 240;
        const gap = 15;
        const padding = 20;
        
        // 캔버스 초기 배경 세팅 (키치한 네온 핑크)
        ctx.fillStyle = '#ff1493'; 
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // 하단 텍스트
        ctx.fillStyle = '#fff';
        ctx.font = '24px Galmuri11';
        ctx.textAlign = 'center';
        ctx.fillText('PIXEL 4 CUTS', canvas.width / 2, canvas.height - 30);
        ctx.font = '14px Galmuri11';
        ctx.fillText(new Date().toLocaleDateString(), canvas.width / 2, canvas.height - 10);

        // 아이패드 전면 카메라 활성화
        navigator.mediaDevices.getUserMedia({ 
            video: { facingMode: "user", width: shotWidth, height: shotHeight } 
        })
        .then(stream => {
            video.srcObject = stream;
        })
        .catch(err => {
            console.error("Camera error:", err);
            statusTxt.innerText = "카메라 권한을 허용해주세요!";
            statusTxt.style.color = "red";
        });

        // 촬영 버튼 로직
        captureBtn.addEventListener('click', () => {
            if (shots < maxShots) {
                const x = padding;
                const y = padding + (shots * (shotHeight + gap));

                // 사진 테두리 (폴라로이드 느낌)
                ctx.fillStyle = '#fff';
                ctx.fillRect(x - 5, y - 5, shotWidth + 10, shotHeight + 10);

                // 거울 모드로 보이는 화면을 캔버스에도 똑같이 좌우 반전하여 저장
                ctx.save();
                ctx.scale(-1, 1);
                ctx.drawImage(video, -(x + shotWidth), y, shotWidth, shotHeight);
                ctx.restore();

                shots++;
                statusTxt.innerText = `촬영 완료! (${shots}/${maxShots})`;

                // 4장 모두 찍었을 때
                if (shots === maxShots) {
                    captureBtn.disabled = true;
                    captureBtn.innerText = "촬영 끝!";
                    downloadBtn.style.display = 'block';
                }
            }
        });

        // 다운로드 버튼 로직
        downloadBtn.addEventListener('click', () => {
            const link = document.createElement('a');
            link.download = `pixel_4cuts_${Date.now()}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
        });
    </script>
</body>
</html>
